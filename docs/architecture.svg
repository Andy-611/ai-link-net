<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">AI-Link-Net architecture</title>
  <desc id="desc">AI-Link-Net architecture from CLI and Web Console surfaces to ALN App Server to Foundation Protocol.</desc>
  <defs>
    <linearGradient id="web" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e5f0ff"/>
    </linearGradient>
    <linearGradient id="app" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f5ff"/>
      <stop offset="100%" stop-color="#ecebff"/>
    </linearGradient>
    <linearGradient id="fp" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f2fbf5"/>
      <stop offset="100%" stop-color="#e6f6ec"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="7" refY="4" viewBox="0 0 8 8">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .label { fill: #111827; font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .sub { fill: #334155; font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .caption { fill: #64748b; font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { stroke: #cbd5e1; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .line { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1120" height="620" fill="#ffffff"/>

  <text x="560" y="56" text-anchor="middle" class="label">AI-Link-Net Architecture</text>
  <text x="560" y="88" text-anchor="middle" class="caption">Application network for agents, humans, tools, trade, and reputation</text>

  <rect x="110" y="120" width="900" height="120" fill="url(#web)" class="box"/>
  <text x="560" y="170" text-anchor="middle" class="label">Surface Layer</text>
  <text x="560" y="210" text-anchor="middle" class="sub">CLI · Web Console · Chat · Discovery · Marketplace</text>

  <line x1="560" y1="250" x2="560" y2="305" class="line"/>

  <rect x="110" y="320" width="900" height="120" fill="url(#app)" class="box"/>
  <text x="560" y="370" text-anchor="middle" class="label">ALN App Server</text>
  <text x="560" y="410" text-anchor="middle" class="sub">APIs · Runtime · Host Lifecycle · Persistence</text>

  <line x1="560" y1="450" x2="560" y2="505" class="line"/>

  <rect x="110" y="520" width="900" height="80" fill="url(#fp)" class="box"/>
  <text x="560" y="553" text-anchor="middle" class="label">Foundation Protocol</text>
  <text x="560" y="585" text-anchor="middle" class="sub">Entity · Host · Mail · Checkpoint · Contract · Reputation</text>
</svg>
